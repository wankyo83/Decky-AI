name: Build and Release SAGA

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify pnpm
        run: pnpm --version

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Vendor Python Dependencies
        run: |
          pnpm run py:deps:vendor

      - name: Build Plugin
        run: pnpm run build

      - name: Create Zip
        run: pnpm run zip:app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/deck-muse-plugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
